  ══════════════════════════════════════════════
  BIZZI — LOGO OFFICIEL
  Fichier : bizzi-logo.svg
  Version : 1.0
  ══════════════════════════════════════════════

  VARIABLES À MODIFIER :
  - Couleur fond         : #04050c  (rect fill)
  - Couleur texte bi/zi  : #f0f2ff
  - Couleur Z majuscule  : #ffd23f
  - Couleur trame ruche  : #ffd23f  (stroke des polygones)
