<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@900&amp;display=swap');
  </style>

  <!-- Dégradé corps abeille -->
  <radialGradient id="bodyGrad" cx="50%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#ffe566"/>
    <stop offset="100%" stop-color="#f5a800"/>
  </radialGradient>

  <!-- Dégradé tête abeille -->
  <radialGradient id="headGrad" cx="40%" cy="35%" r="60%">
    <stop offset="0%" stop-color="#ffe566"/>
    <stop offset="100%" stop-color="#e09500"/>
  </radialGradient>

  <!-- Dégradé ailes -->
  <radialGradient id="wingGrad" cx="30%" cy="20%" r="70%">
    <stop offset="0%" stop-color="rgba(220,240,255,0.5)"/>
    <stop offset="100%" stop-color="rgba(180,210,255,0.12)"/>
  </radialGradient>
</defs>

<!-- ── FOND ── -->
<rect width="680" height="280" fill="#04050c" rx="20"/>

