<svg xmlns="http://www.w3.org/2000/svg" viewBox="-50 -45 120 80" width="120" height="80" role="img">
<!--
  ══════════════════════════════════════════
  BIZZI — Abeille standalone
  Fichier : bizzi-bee.svg
  Usage   : <img src="bizzi-bee.svg"> ou inline
  ══════════════════════════════════════════
-->
<title>Abeille Bizzi</title>
<defs>
  <radialGradient id="bodyGrad" cx="50%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#ffe566"/>
    <stop offset="100%" stop-color="#f5a800"/>
  </radialGradient>
  <radialGradient id="headGrad" cx="40%" cy="35%" r="60%">
    <stop offset="0%" stop-color="#ffe566"/>
    <stop offset="100%" stop-color="#e09500"/>
  </radialGradient>
  <radialGradient id="wingGrad" cx="30%" cy="20%" r="70%">
    <stop offset="0%" stop-color="rgba(220,240,255,0.5)"/>
    <stop offset="100%" stop-color="rgba(180,210,255,0.1)"/>
  </radialGradient>
</defs>

<!-- Ailes supérieures -->
<path d="M-14,-8 Q-18,-38 -2,-34 Q10,-30 6,-8" fill="url(#wingGrad)" stroke="rgba(200,230,255,0.5)" stroke-width="0.8"/>
<path d="M10,-8 Q14,-38 28,-34 Q40,-30 36,-8" fill="url(#wingGrad)" stroke="rgba(200,230,255,0.5)" stroke-width="0.8"/>
<!-- Nervures ailes sup -->
<path d="M-4,-10 Q-2,-28 4,-26" fill="none" stroke="rgba(180,220,255,0.35)" stroke-width="0.6"/>
<path d="M20,-10 Q22,-28 26,-26" fill="none" stroke="rgba(180,220,255,0.35)" stroke-width="0.6"/>

<!-- Ailes inférieures -->
<path d="M-10,6 Q-16,26 -2,24 Q8,22 8,6" fill="url(#wingGrad)" stroke="rgba(200,230,255,0.4)" stroke-width="0.8" opacity="0.85"/>
<path d="M14,6 Q20,26 34,22 Q40,18 36,6" fill="url(#wingGrad)" stroke="rgba(200,230,255,0.4)" stroke-width="0.8" opacity="0.85"/>

<!-- Abdomen -->
<ellipse cx="10" cy="4" rx="26" ry="16" fill="url(#bodyGrad)"/>
<!-- Raies noires -->
<path d="M-4,-10 Q-6,4 -4,16 Q0,18 4,16 Q6,4 4,-10 Q2,-12 -4,-10" fill="#1a1200" opacity="0.75"/>
<path d="M12,-11 Q10,4 12,16 Q16,18 20,16 Q22,4 20,-11 Q16,-13 12,-11" fill="#1a1200" opacity="0.75"/>
<!-- Extrémité + dard -->
<ellipse cx="34" cy="4" rx="6" ry="9" fill="#c97d00"/>
<path d="M38,-1 Q44,4 38,9 Q36,6 36,4 Q36,2 38,-1" fill="#8a5c00"/>

<!-- Thorax -->
<ellipse cx="-14" cy="2" rx="12" ry="11" fill="#c97d00"/>
<path d="M-22,-6 Q-26,-2 -22,2" fill="none" stroke="#e8a800" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
<path d="M-24,0 Q-28,4 -24,8" fill="none" stroke="#e8a800" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

<!-- Tête -->
<circle cx="-28" cy="3" r="12" fill="url(#headGrad)"/>
<!-- Yeux composés -->
<ellipse cx="-33" cy="0" rx="4" ry="5" fill="#1a0a00"/>
<ellipse cx="-23" cy="-1" rx="3.5" ry="4.5" fill="#1a0a00"/>
<!-- Reflets yeux -->
<ellipse cx="-34" cy="-1" rx="1.5" ry="2" fill="rgba(255,255,255,0.3)"/>
<ellipse cx="-24" cy="-2" rx="1.2" ry="1.8" fill="rgba(255,255,255,0.3)"/>
<!-- Mandibules -->
<path d="M-36,8 Q-38,12 -34,13" fill="none" stroke="#a06000" stroke-width="1.5" stroke-linecap="round"/>
<path d="M-26,8 Q-24,12 -26,14" fill="none" stroke="#a06000" stroke-width="1.5" stroke-linecap="round"/>

<!-- Antennes -->
<path d="M-34,-11 Q-40,-26 -38,-36" fill="none" stroke="#c97d00" stroke-width="1.8" stroke-linecap="round"/>
<circle cx="-38" cy="-37" r="3.5" fill="#ffd23f"/>
<circle cx="-38" cy="-37" r="1.5" fill="#c97d00"/>
<path d="M-26,-12 Q-22,-26 -24,-36" fill="none" stroke="#c97d00" stroke-width="1.8" stroke-linecap="round"/>
<circle cx="-24" cy="-37" r="3.5" fill="#ffd23f"/>
<circle cx="-24" cy="-37" r="1.5" fill="#c97d00"/>

<!-- Pattes -->
<path d="M-20,12 Q-22,22 -26,28" fill="none" stroke="#c97d00" stroke-width="1.5" stroke-linecap="round"/>
<path d="M-12,14 Q-10,24 -8,30" fill="none" stroke="#c97d00" stroke-width="1.5" stroke-linecap="round"/>
<path d="M8,14 Q12,24 14,30" fill="none" stroke="#c97d00" stroke-width="1.5" stroke-linecap="round"/>
<!-- Corbeilles à pollen -->
<ellipse cx="-26" cy="28" rx="3" ry="5" fill="#f5a800" stroke="#c97d00" stroke-width="0.5"/>
<ellipse cx="14" cy="30" rx="3" ry="5" fill="#f5a800" stroke="#c97d00" stroke-width="0.5"/>

</svg>
