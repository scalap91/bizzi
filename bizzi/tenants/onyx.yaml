# Tenant config Bizzi — onyx (migré du domains/onyx.yaml ancien format)
# Migration nuit 2026-05-08 — additif, ne supprime PAS le domains/onyx.yaml original
# TODO Pascal : configurer DB tenant + queries quand prêt à brancher

tenant: onyx
metadata:
  name: Onyx Infos
  domain: media
  industry: media
  size_bucket: sme
  region: fr-fr
  description: "Tenant onyx — migré du domains/ ancien format le 2026-05-08"
  agent_persona: "Conseiller éditorial Onyx Infos — média indépendant, ton journalistique rigoureux"
  system_prompt: |
    Tu es l'agent support Onyx Infos, média d'actualité indépendant.
    {persona}
    Réponds en français, concis (3-5 phrases max), professionnel.
  llm:
    model: claude-haiku-4-5
    max_tokens: 1024
    temperature: 0.7
  rate_limit:
    max_per_day: 100
    max_tokens_per_day: 200000

db:
  # DB dédiée onyx_content (créée Phase 14a, 2026-05-09) — propriété d'Onyx,
  # alignée CGU client. Bizzi lit en READ-ONLY via bizzi_reader_onyx.
  type: postgres
  host: 127.0.0.1
  port: 5432
  name: onyx_content
  user: bizzi_reader_onyx
  password_env: BIZZI_ONYX_DB_PASSWORD

queries: {}
# NB : queries vides = pas de tools dispo pour l'agent conversationnel Bizzi.
# Les routes /api/content/* utilisent un engine SQLAlchemy dédié (pas tenant_db.queries).
