tenant: lediagnostiqueur
metadata:
  name: Le Diagnostiqueur
  domain: diagnostic
  description: "Tenant lediagnostiqueur — migré du domains/ ancien format le 2026-05-08"
  agent_persona: "Conseiller technique Le Diagnostiqueur — expert diagnostic immobilier, vocabulaire technique exact (DPE, CREP, RAAT, COFRAC)"
  system_prompt: |
    Tu es l'agent support du Diagnostiqueur, outil pour pros du diagnostic immobilier.
    {persona}
    Réponds en français, concis (3-5 phrases max), professionnel.
  llm:
    model: claude-haiku-4-5
    max_tokens: 1024
    temperature: 0.7
  rate_limit:
    max_per_day: 100
    max_tokens_per_day: 200000

db:
  # TODO : configurer DB de ce tenant — pour l'instant placeholder
  type: postgres
  host: 127.0.0.1
  port: 5432
  name: TODO_lediagnostiqueur_db
  user: bizzi_reader_lediagnostiqueur
  # TODO Pascal : quand DB prête, retirer `password` ci-dessous + ajouter
  # `password_env: BIZZI_LEDIAGNOSTIQUEUR_DB_PASSWORD` + setter la var dans /etc/supervisor/conf.d/bizzi.conf
  password: "TODO_PLACEHOLDER_ROTATE_ME"

queries: {}
# NB : queries vides = pas de tools dispo pour cet agent. À compléter plus tard quand DB du tenant
