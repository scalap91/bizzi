server {
    server_name onyx-infos.fr www.onyx-infos.fr;
    charset utf-8;
    types { text/html html htm; application/json json; text/css css; application/javascript js; image/jpeg jpg jpeg; image/png png; image/svg+xml svg; }
    root /opt/onyx-infos/public;
    index index.html;

    # Phase 14b - fallback statique JAMstack si bizzi-api 5xx
    error_page 502 503 504 = @api_fallback;

    # Servir directement les fichiers statiques pre-generes (priorite)
    location ^~ /articles/ {
        root /opt/onyx-infos/public;
        try_files $uri =404;
        add_header X-Static-Fallback "true" always;
    }

    # Page équipe (URL propre /equipe)
    location = /equipe {
        default_type text/html;
        alias /opt/onyx-infos/public/equipe.html;
    }

    # Fiche auteur (URL propre /auteur/<slug>) — JS lit le slug depuis location.pathname
    location ~* ^/auteur/(.+)$ {
        default_type text/html;
        alias /opt/onyx-infos/public/auteur.html;
    }

    location ~* ^/article/(.+)$ {
        set $slug $1;
        set $is_bot 0;
        if ($http_user_agent ~* "(googlebot|Googlebot|facebookexternalhit|Twitterbot|WhatsApp|LinkedInBot|TelegramBot|Slackbot|Discordbot|AdsBot|bot|crawler|spider)") {
            set $is_bot 1;
        }
        if ($is_bot = 1) {
            proxy_pass http://127.0.0.1:3000/api/content/article-by-slug?slug=$slug;
            break;
        }
        default_type text/html;
        alias /opt/onyx-infos/public/article.html;
    }

    # Fallback statique declenche par error_page 502/503/504
    location @api_fallback {
        default_type text/html;
        # Si la requete originale etait /article/<slug>, on sert le statique
        if ($uri ~ "^/article/(.+)$") {
            rewrite ^/article/(.+)$ /articles/$1.html break;
        }
        # Sinon on sert l'index statique
        rewrite ^.*$ /index-static.html break;
        root /opt/onyx-infos/public;
        try_files $uri /index-static.html =503;
        add_header X-Static-Fallback "api-down" always;
    }
    location /api/sitemap.xml {
        proxy_pass http://127.0.0.1:3000/api/content/sitemap.xml;
        proxy_set_header Host $host;
    }
    location / {
        default_type text/html;
        try_files $uri $uri.html $uri/ /index.html;
    }

    location /api/content/article-by-slug {
        proxy_pass http://127.0.0.1:3000/api/content/article-by-slug;
        proxy_set_header Host $host;
        proxy_intercept_errors on;
        error_page 500 502 503 504 = @api_fallback;
    }
    location /api/content/sitemap.xml {
        proxy_pass http://127.0.0.1:3000/api/content/sitemap.xml;
        proxy_set_header Host $host;
    }
    location /api/content/article-meta {
        proxy_pass http://127.0.0.1:3000/api/content/article-meta;
        proxy_set_header Host $host;
        proxy_intercept_errors on;
        error_page 500 502 503 504 = @api_fallback;
    }
    location /api/ {
        proxy_pass https://bizzi.fr/api/;
        proxy_set_header Host bizzi.fr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
        add_header 'Access-Control-Allow-Methods' '*' always;
    }

    location ~* ^/article\.html {
        set $is_bot 0;
        if ($http_user_agent ~* "(googlebot|Googlebot|facebookexternalhit|Twitterbot|WhatsApp|LinkedInBot|TelegramBot|Slackbot|Discordbot|AdsBot|bot|crawler|spider)") {
            set $is_bot 1;
        }
        if ($is_bot = 1) {
            rewrite ^/article\.html$ /api-og last;
        }
        try_files $uri /index.html;
    }

    location /api-og {
        internal;
        proxy_pass http://127.0.0.1:3000/api/content/article-meta$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/onyx-infos.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/onyx-infos.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    http2 on;
}
server {
    listen 80;
    server_name onyx-infos.fr www.onyx-infos.fr;
    return 301 https://$host$request_uri;
}