# ══════════════════════════════════════════════════════════════
# PIPELINE
# ══════════════════════════════════════════════════════════════

pipeline:
  schedule: "0 */2 * * *"
  steps: [trend_watch, meeting, scrape, write, fact_check, validate, publish, distribute]

output:
  type: article
  word_count_min: 400
  word_count_max: 800
  validation_score_min: 70
  formats: [twitter_thread, linkedin_post, instagram_caption, facebook_post, tiktok_script, newsletter]

editorial_rules:
  - "Chaque fait source ou au conditionnel"
  - "Aucune position politique affirmee"
  - "Citer les sources explicitement"
  - "Zero contenu haineux ou diffamatoire"
  - "Toujours proteger les sources confidentielles"

tools:
  chat: true
  email: true
  phone: false
  poster: false
  complaint: true
  rgpd: true

ui:
  primary_color: "#e02d2d"
  vocabulary:
    content_unit: "article"
    content_units: "articles"
    producer: "journaliste"
    producers: "journalistes"
    validator: "redacteur en chef"
    meeting_room: "salle de reunion"
    workspace: "bureau"
    source: "source RSS"
    output_verb: "publier"
    trash_reason: "rejete par le redacteur en chef"
    score_label: "score editorial"
