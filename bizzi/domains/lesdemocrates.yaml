  provider: vapi
  monthly_budget_eur: 50
  shadow_mode: true
  vapi_assistant_id: "1aca131c-21c5-4ac1-848a-e44a8c421f2c"
  voice: "21m00Tcm4TlvDq8ikWAM"
  caller_id: "+18604517094"
  max_duration_sec: 600
  legal_disclaimer: "Bonjour, je suis l'assistant IA des Démocrates. Cet appel est enregistré pour amélioration de la qualité. Souhaitez-vous continuer ?"
