# Intégration site lesdemocrates.org
integration:
  iframe:
    embed_url: "https://bizzi.fr/iframe/articles?tenant=lesdemocrates&theme=light"
    target_route: "/actualites/"
    height_default: "1400"
    sandbox: "allow-same-origin allow-scripts allow-popups"
