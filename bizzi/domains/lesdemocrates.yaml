# ══════════════════════════════════════════════════════════════
# EDITORIAL TEMPLATE — structure obligatoire des articles
# Observée à partir des 4 articles existants sur lesdemocrates.org
# ══════════════════════════════════════════════════════════════

editorial_template:
  format: html_article
  ton: "Journalistique factuel mais engagé. Solutions concrètes, ancrage territorial."
  longueur_mots:
    min: 1200
    cible: 1800
    max: 2500
  structure:
    - id: intro
      role: "Plante le contexte (lieu, problème, autorité officielle qui le reconnaît). 1-2 paragraphes, ~120-180 mots."
      obligatoire: true
    - id: table_matieres
      role: "Liste des H2 du body (générée auto). Permet le scan rapide."
      obligatoire: true
    - id: sections_h2
      role: "3-5 sections thématiques, chaque H2 traite un angle (cause, situation, solution, action mairie/parti, perspective)."
      min_count: 3
      max_count: 6
      obligatoire: true
    - id: chiffres_cles
      role: "Encart visuel synthèse des 3-5 statistiques majeures. Format : '📊 X% — description courte'."
      obligatoire: true
    - id: faq
      role: "3-5 questions fréquentes avec réponses courtes (50-100 mots chacune)."
      obligatoire: true
    - id: sources
      role: "Liste des sources citées en pied d'article (organismes officiels + médias)."
      obligatoire: true
  elements_riches:
    - "Émojis ponctuels pour stats clés : 📊 📍 💡 ⚠️ 🏥 🚆 (selon thème)"
    - "Citations en blockquote `> « citation »— Source` avec attribution explicite"
    - "Tableaux markdown pour comparaisons (avant/après, scénarios, données chiffrées)"
    - "Listes - à puces pour énumérer conséquences, actions, recommandations"
    - "**strong** sur les chiffres-clés et noms propres importants"
  obligations:
    - "Toujours citer la SOURCE et la DATE de chaque chiffre (ARS, INSEE, ministère, Le Parisien, Le Monde, etc.)"
    - "Ancrage territorial : nommer les communes, arrondissements, quartiers concernés"
    - "Cas particuliers : noms de personnes (médecins, élus, associations) avec dates précises"
    - "Solutions évoquées : ce que fait la mairie, l'État, les associations + ce que le parti propose"
    - "Storytelling : commencer par un cas concret (un Lissois qui ne trouve pas de médecin) puis élargir"
    - "Conclusion ouverte : appel à l'action OU mise en perspective (pas de slogan partisan)"
  interdictions:
    - "Pas de slogan partisan agressif"
    - "Pas de jugements moraux non sourcés"
    - "Pas de chiffre sans source"
    - "Pas d'article < 1200 mots"
    - "Pas d'attaque ad hominem"
  exemples_titres:
    - "Désert médical à Lisses (91090) : la réalité d'une commune essonnienne en première ligne"
    - "Saint-Denis debout : quand des milliers de citoyens disent non au racisme"
    - "Stéphane Beaudet à Grand Paris Sud : ce qu'il faut savoir"
    - "Transports à Bondoufle : pourquoi la commune mérite une branche du T12"
  template_html_classes:
    article_body: "ab"
    article_header: "ah"
    article_title: "a1"
    article_meta: "am"
    article_image: "ai"
    blockquote_left_border_color: "#D6140D"
    primary_color: "#D6140D"

pipeline:
  schedule: "0 */3 * * *"   # toutes les 3 heures
  steps:
    - monitor_news        # scrape RSS sources
    - meeting             # agents se concertent dans la salle de réunion virtuelle
    - analyze             # analystes produisent un brief
    - write_statement     # rédaction communiqué
    - legal_check         # passage chez le conseiller juridique
    - validate            # porte-parole score sur 100
    - publish_press       # publication communiqué validé
    - distribute          # community manager déploie sur les formats
  pipeline_endpoint: "/api/pipeline/run"
  tenant: lesdemocrates

output:
  type: communique
  word_count_min: 200
  word_count_max: 600
  validation_score_min: 80
  formats:
    - press_release
    - twitter_thread
    - linkedin_post
    - facebook_post
    - newsletter
    - speech
  iframe_path: "/iframe/articles?tenant=lesdemocrates"

editorial_rules:
  - "Aucune déclaration diffamatoire (loi 1881)"
  - "Toujours citer les sources des chiffres et études"
  - "Respecter la présomption d'innocence"
  - "Positions cohérentes avec la ligne sociale-démocrate (justice sociale, responsabilité, souveraineté)"
  - "Ton respectueux y compris dans l'opposition aux adversaires politiques"
  - "Nommer les responsables sans personnaliser à outrance"
  - "Pas de stigmatisation de communautés, religions, origines"
  - "Privilégier la clarté pédagogique au jargon politicien"

ui:
  primary_color: "#1e40af"        # bleu démocrate (proche du #1e3a8a du template)
  secondary_color: "#fbbf24"      # jaune accent (cf. site)
  vocabulary:
    content_unit: "communiqué"
    content_units: "communiqués"
    producer: "analyste"
    producers: "analystes"
    validator: "porte-parole"
    meeting_room: "salle de réunion"
    workspace: "bureau"
    source: "veille politique"
    output_verb: "diffuser"
    trash_reason: "rejeté par le porte-parole"
    score_label: "score politique"

# Salle de réunion virtuelle où les agents se rencontrent au step `meeting`
meeting_room:
  name: "Salle du Bureau national"
  participants: all  # tous les agents instanciés
  facilitator: spokesperson
  duration_max_min: 15
  output: brief_consolidated

# Bureaux (workspaces) — un par membre de l'équipe
# Permet de matérialiser visuellement où travaille chaque agent dans l'UI Bizzi.
workspaces:
  - id: presidence
    label: "Présidence"
    occupant: pascal_repir
  - id: secretariat_general
    label: "Secrétariat général"
    occupant: karim_bouchra
  - id: tresorerie
    label: "Trésorerie"
    occupant: paul_martin
  - id: direction_communication
    label: "Direction Communication"
    occupants: [sico_dia]
  - id: pole_mobilisation
    label: "Pôle Mobilisation"
    occupant: clara_beaufort
  - id: pole_programme
    label: "Pôle Programme"
    occupant: lucas_martin
  - id: pole_territoires
    label: "Pôle Territoires"
    occupant: alice_roy
  - id: cellule_strategie
    label: "Cellule Stratégie"
    occupant: emile_lefevre
  - id: cellule_juridique
    label: "Cellule Juridique"
    occupant: null   # à pourvoir

