  shared_token_env: BIZZI_SHARED_TOKEN

# ══════════════════════════════════════════════════════════════
# SOCIAL — module bizzi.social (clips vidéo + publication multi-réseaux)
# Phase 0 = shadow mode strict. Aucune publication tant que Pascal n'a
# pas validé via POST /api/social/post/{id}/approve.
# ══════════════════════════════════════════════════════════════

social:
  shadow_mode: true
  networks: [tiktok, instagram, x, linkedin]

  # Credentials — à provisionner via .env (Phase 1)
  tiktok_token_ref:    env:TIKTOK_TOKEN_LESDEMOCRATES
  instagram_token_ref: env:INSTAGRAM_TOKEN_LESDEMOCRATES
  x_token_ref:         env:X_BEARER_TOKEN_LESDEMOCRATES
  linkedin_token_ref:  env:LINKEDIN_TOKEN_LESDEMOCRATES

  # Templates : 'base' = builtin, 'overrides' = surcharge.
  # Builtins dispo : airbizness_deal, lesdemocrates_article, onyx_scoop
  templates:
    article_clip:
      base: lesdemocrates_article
      overrides:
        duration_sec: 30
        overlays:
          - { type: drawbox,  x: 0, y: 0,    w: iw, h: 180, color: "black@0.85" }
          - { type: drawbox,  x: 0, y: 1740, w: iw, h: 180, color: "black@0.85" }
          - { type: drawtext, text: "Les Democrates",   color: "#fbbf24", size: 56, y: 60,  shadow: true }
          - { type: drawtext, text: "{category}",       color: "#1e40af", size: 30, y: 130 }
          - { type: drawtext, text: "{title}",          color: "white",   size: 60, y: 600, shadow: true, shadow_x: 3, shadow_y: 3 }
          - { type: drawtext, text: "{subtitle}",       color: "white@0.85", size: 38, y: 900 }
          - { type: drawbox,  x: 140, y: 1760, w: 800, h: 80, color: "#1e40af@0.95" }
          - { type: drawtext, text: "Lire sur lesdemocrates.org", color: "white", size: 30, y: 1782 }

    territory_focus:
      base: lesdemocrates_article
      overrides:
        duration_sec: 35
        overlays:
          - { type: drawbox,  x: 0, y: 0,    w: iw, h: 180, color: "black@0.85" }
          - { type: drawtext, text: "TERRITOIRES",      color: "#fbbf24", size: 40, y: 70 }
          - { type: drawtext, text: "{region_label}",   color: "white",   size: 32, y: 130 }
          - { type: drawtext, text: "{title}",          color: "white",   size: 60, y: 700, shadow: true }
          - { type: drawbox,  x: 0, y: 1740, w: iw, h: 180, color: "black@0.85" }
          - { type: drawtext, text: "Pour {region_label}", color: "#1e40af", size: 36, y: 1782 }

  # Déclencheurs auto — Phase 1 (pas encore branchés au pipeline)
  triggers:
    - event: article_published
      categories: [national, social, ecologie, justice, economie]
      template: article_clip
      networks: [tiktok, instagram]
      caption: "{title} — {subtitle} #LesDemocrates #{category}"
      hashtags: [LesDemocrates, Politique, France]
    - event: article_published
      categories: [territoires]
      template: territory_focus
      networks: [tiktok, instagram, linkedin]
      caption: "{title} — focus {region_label}. #LesDemocrates"
      hashtags: [LesDemocrates, Territoires]

  safety:
    require_human_approval: true
    caption_max_chars: 2200
    forbid_terms_ref: editorial_rules   # réutilise les 8 règles existantes
