  - { id: paca, label: "Provence-Alpes-Côte d'Azur" }
  - { id: occ, label: "Occitanie" }
  - { id: naq, label: "Nouvelle-Aquitaine" }
  - { id: pdl, label: "Pays de la Loire" }
  - { id: bre, label: "Bretagne" }
  - { id: nor, label: "Normandie" }
